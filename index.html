<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2705;</text></svg>" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <!-- Tab navigation -->
      <nav class="tabs">
        <button class="tab active" data-tab="track">Today</button>
        <button class="tab" data-tab="dashboard">Dashboard</button>
      </nav>

      <!-- Today tab -->
      <div id="tab-track" class="tab-content">
        <p id="date" class="date"></p>
        <div id="loading" class="loading">Loading&hellip;</div>
        <div id="cards"></div>
        <section id="all-done" class="card card-done hidden">
          <h2>&#x2705; All done for today!</h2>
        </section>
      </div>

      <!-- Dashboard tab -->
      <div id="tab-dashboard" class="tab-content hidden">
        <div id="streak-info" class="streak-info"></div>
        <div id="heatmap" class="heatmap-container"></div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
